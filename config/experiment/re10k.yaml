# @package _global_

defaults:
  - override /dataset: re10k
  - override /model/encoder: resplat
  - override /loss: [mse, lpips]

wandb:
  name: re10k
  tags: [re10k, 256x256]

data_loader:
  train:
    batch_size: 14

trainer:
  max_steps: 300_001
  num_nodes: 1

model:
  encoder:
    num_depth_candidates: 128

# lpips loss
loss:
  lpips:
    apply_after_step: 0
    weight: 0.5
    perceptual_loss: true

dataset: 
  image_shape: [256, 256]
  roots: [datasets/re10k]
  near: 0.01
  far: 100.
  baseline_scale_bounds: false
  make_baseline_1: false
  train_times_per_scene: 1
  highres: false
  scannet: false
  tartanair: false
  load_depth: false
  pose_align_first_view: false
  scale_extrinsics: 1.
  load_remain_context: false
  pose_align_middle_view: false

test:
  eval_time_skip_steps: 5
  compute_scores: true
